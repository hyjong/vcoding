from pathlib import Path

html="""<!doctype html><html lang='ko'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'>

<title>덕후급 귀멸 퀴즈</title><style>

body{background:#d8c8a8;font-family:Arial;padding:20px}

.card{max-width:900px;margin:auto;background:#fffdf7;padding:24px;border-radius:16px;box-shadow:0 6px 18px #0004}

button{display:block;width:100%;margin:8px 0;padding:12px;border-radius:10px;border:0;background:#ece5d6;cursor:pointer}

#timer{font-weight:bold;color:#900}

</style></head><body><div class='card'><h1>📖 귀멸의 칼날 덕후급 퀴즈</h1><div id='timer'></div><h2 id='q'></h2><div id='a'></div></div>

<script>

const quiz=[

{q:"무잔의 심장/뇌 개수는?",a:["5/7","7/5","6/6","8/4"],c:1},

{q:"무잔이 분열한 조각 수는?",a:["1200","1500","1800","2000"],c:2},

{q:"코쿠시보의 인간 이름은?",a:["미치카츠","요리이치","하쿠지","카이가쿠"],c:0},

{q:"요리이치 사망 나이는?",a:["82","84","85","87"],c:2},

{q:"무잔이 가장 두려워한 존재는?",a:["태양","탄지로","요리이치","교메이"],c:2},

{q:"아카자의 인간 이름은?",a:["하쿠지","겐조","소이치","렌"],c:0},

{q:"도우마가 이끈 종교는?",a:["명월교","극락교","천도교","만세교"],c:1},

{q:"카이가쿠의 호흡은?",a:["물","바람","번개","달"],c:2},

{q:"요리이치 귀걸이 이름은?",a:["태양","하나후다","일륜","해"],c:1},

{q:"13형의 의미는?",a:["숨겨진 기술","최강기","12형 반복으로 무잔의 핵 파괴","혁도 발동"],c:2}

];

let i=0,s=0,t,intv;

const q=qid=document.getElementById('q'),a=document.getElementById('a'),tm=document.getElementById('timer');

function tick(){tm.textContent='⏰ '+t+'초';}

function show(){

if(i>=quiz.length){clearInterval(intv);let rank=s==10?'SSS+':s>=9?'SSS':s>=8?'SS':s>=6?'S':s>=4?'A':'B';

q.innerHTML=`완료! ${s}/10`;a.innerHTML=`<h2>${rank}</h2><button onclick='location.reload()'>다시하기</button>`;tm.textContent='';return;}

clearInterval(intv);t=50;tick();intv=setInterval(()=>{t--;tick();if(t<=0){i++;show();}},1000);

q.textContent=(i+1)+'. '+quiz[i].q;a.innerHTML='';

quiz[i].a.forEach((v,n)=>{let b=document.createElement('button');b.textContent=v;b.onclick=()=>{clearInterval(intv);if(n===quiz[i].c)s++;i++;show();};a.appendChild(b);});

}

show();

</script></body></html>"""

path=Path("/mnt/data/귀멸_덕후급_퀴즈.html")

path.write_text(html,encoding="utf-8")
