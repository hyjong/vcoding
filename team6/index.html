<!DOCTYPE html>

<html lang="ko">

<head>

<meta charset="UTF-8">

<title>랜덤 원소 퀴즈</title>

<style>

  body {

    font-family: Arial;

    text-align: center;

    margin-top: 70px;

  }

  .box {

    border: 2px solid #333;

    display: inline-block;

    padding: 30px;

    border-radius: 12px;

    width: 320px;

  }

  input {

    padding: 10px;

    width: 200px;

    font-size: 16px;

  }

  button {

    padding: 10px;

    margin: 5px;

    cursor: pointer;

  }

  #hint {

    margin-top: 10px;

    color: #555;

    font-style: italic;

  }

  #result, #score {

    margin-top: 10px;

    font-weight: bold;

  }

</style>

</head>

<body>

<div class="box">

  <h2>🧪 랜덤 원소 퀴즈</h2>

  <p id="question"></p>

  <input type="text" id="answer" placeholder="기호 입력">

  <br>

  <button onclick="checkAnswer()">확인</button>

  <button onclick="showHint()">힌트</button>

  <button onclick="restartGame()" id="restartBtn" style="display:none;">다시하기 🔁</button>

  <p id="hint"></p>

  <p id="result"></p>

  <p id="score"></p>

</div>

<script>

const originalQuiz = [

  { name:"수소", symbol:"H", hint:"가장 가벼운 원소" },

  { name:"헬륨", symbol:"He", hint:"풍선에 쓰임" },

  { name:"탄소", symbol:"C", hint:"생명체의 기본" },

  { name:"질소", symbol:"N", hint:"공기의 대부분" },

  { name:"산소", symbol:"O", hint:"호흡 필수" },

  { name:"나트륨", symbol:"Na", hint:"소금 구성" },

  { name:"칼륨", symbol:"K", hint:"신경 기능" },

  { name:"철", symbol:"Fe", hint:"혈액 관련" },

  { name:"구리", symbol:"Cu", hint:"전선 재료" },

  { name:"은", symbol:"Ag", hint:"귀금속" }

];

let quiz = [];

let current = null;

let score = 0;

const q = document.getElementById("question");

const hint = document.getElementById("hint");

const result = document.getElementById("result");

const scoreText = document.getElementById("score");

const input = document.getElementById("answer");

const restartBtn = document.getElementById("restartBtn");

// 배열에서 랜덤 1개 뽑고 제거

function getRandomQuestion(){

  if(quiz.length === 0) return null;

  const idx = Math.floor(Math.random() * quiz.length);

  return quiz.splice(idx, 1)[0];

}

function showQuestion(){

  current = getRandomQuestion();

  if(!current){

    q.textContent = "🎉 퀴즈 완료!";

    hint.textContent = "";

    result.textContent = "";

    scoreText.textContent = `🎯 최종 점수: ${score}/${originalQuiz.length}`;

    restartBtn.style.display = "inline-block";

    return;

  }

  q.textContent = `${current.name}의 원소 기호는?`;

  hint.textContent = "";

}

function checkAnswer(){

  let user = input.value.trim();

  if(user.toLowerCase() === current.symbol.toLowerCase()){

    result.textContent = "✔ 정답!";

    score++;

  } else {

    result.textContent = `✘ 오답! 정답은 ${current.symbol}`;

  }

  input.value = "";

  scoreText.textContent = `점수: ${score}`;

  showQuestion();

}

function showHint(){

  if(current){

    hint.textContent = "💡 힌트: " + current.hint;

  }

}

function restartGame(){

  quiz = [...originalQuiz];

  score = 0;

  result.textContent = "";

  scoreText.textContent = "";

  restartBtn.style.display = "none";

  showQuestion();

}

function startGame(){

  quiz = [...originalQuiz];

  score = 0;

  showQuestion();

}

startGame();

</script>

</body>

</html>
