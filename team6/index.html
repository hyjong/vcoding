<!DOCTYPE html>

<html lang="ko">

<head>

<meta charset="UTF-8">

<title>랜덤 원소 퀴즈</title>

<style>

  body {

    font-family: Arial;

    text-align: center;

    margin-top: 70px;

  }

  .box {

    border: 2px solid #333;

    display: inline-block;

    padding: 30px;

    border-radius: 12px;

    width: 320px;

  }

  input {

    padding: 10px;

    width: 200px;

    font-size: 16px;

  }

  button {

    padding: 10px;

    margin: 5px;

    cursor: pointer;

  }

  #hint {

    margin-top: 10px;

    color: #555;

    font-style: italic;

  }

  #result, #score {

    margin-top: 10px;

    font-weight: bold;

  }

</style>

</head>

<body>

<div class="box">

  <h2>🧪 원소 기호 퀴즈</h2>

  <p id="question"></p>

  <input type="text" id="answer" placeholder="기호 입력">

  <br>

  <button onclick="checkAnswer()">확인</button>

  <button onclick="showHint()">힌트</button>

  <button onclick="restartGame()" id="restartBtn" style="display:none;">다시하기 🔁</button>

  <p id="hint"></p>

  <p id="result"></p>

  <p id="score"></p>

</div>

<script>

let quiz = [

  { name:"수소", symbol:"H", hint:"알파벳 1글자" },

  { name:"헬륨", symbol:"He", hint:"알파벳 2글자" },

  { name:"탄소", symbol:"C", hint:"3획 느낌의 간단한 문자" },

  { name:"질소", symbol:"N", hint:"지그재그 느낌의 한 글자" },

  { name:"산소", symbol:"O", hint:"동그라미 모양 문자" },

  { name:"나트륨", symbol:"Na", hint:"대문자 + 소문자 조합" },

  { name:"칼륨", symbol:"K", hint:"직선 느낌 한 글자" },

  { name:"철", symbol:"Fe", hint:"두 글자지만 첫 글자 F" },

  { name:"구리", symbol:"Cu", hint:"C로 시작하는 두 글자" },

  { name:"은", symbol:"Ag", hint:"A로 시작하는 두 글자" }

];

let originalQuiz = [...quiz];

function shuffle(arr){

  for(let i = arr.length - 1; i > 0; i--){

    let j = Math.floor(Math.random() * (i + 1));

    [arr[i], arr[j]] = [arr[j], arr[i]];

  }

}

let index = 0;

let score = 0;

const q = document.getElementById("question");

const hint = document.getElementById("hint");

const result = document.getElementById("result");

const scoreText = document.getElementById("score");

const input = document.getElementById("answer");

const restartBtn = document.getElementById("restartBtn");

function startGame(){

  quiz = [...originalQuiz];

  shuffle(quiz);

  index = 0;

  score = 0;

  result.textContent = "";

  hint.textContent = "";

  scoreText.textContent = "";

  restartBtn.style.display = "none";

  showQuestion();

}

function showQuestion(){

  if(index < quiz.length){

    q.textContent = `${quiz[index].name}의 원소 기호는?`;

  } else {

    q.textContent = "🎉 퀴즈 종료!";

    result.textContent = "";

    hint.textContent = "";

    scoreText.textContent = `🎯 최종 점수: ${score}/${quiz.length}`;

    restartBtn.style.display = "inline-block";

  }

}

function checkAnswer(){

  let user = input.value.trim();

  if(user.toLowerCase() === quiz[index].symbol.toLowerCase()){

    result.textContent = "✔ 정답!";

    score++;

  } else {

    result.textContent = `✘ 오답! 정답은 ${quiz[index].symbol}`;

  }

  index++;

  input.value = "";

  showQuestion();

  scoreText.textContent = `점수: ${score}`;

}

function showHint(){

  if(index < quiz.length){

    hint.textContent = "💡 힌트: " + quiz[index].hint;

  }

}

function restartGame(){

  startGame();

}

startGame();

</script>

</body>

</html>
