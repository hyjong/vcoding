<!DOCTYPE html>

<html lang="ko">

<head>

<meta charset="UTF-8">

<title>구구단 퀴즈</title>

<style>

body{

    font-family: sans-serif;

    text-align:center;

    margin-top:50px;

}

button{

    padding:10px 20px;

    margin:10px;

    font-size:18px;

}

input{

    font-size:20px;

    width:100px;

    text-align:center;

}

</style>

</head>

<body>

<h1>구구단 퀴즈</h1>

<div id="game">

    <h2 id="question"></h2>

    <input type="number" id="answer">

    <br><br>

    <button onclick="check()">확인</button>

    <button onclick="restart()">다시 시작</button>

    <button onclick="quit()">그만하기</button>

    <p id="count"></p>

    <p id="message"></p>

</div>

<script>

let total=7;

let current=0;

let a,b;

let startTime;

function startGame(){

    current=0;

    startTime=new Date();

    nextQuestion();

}

function nextQuestion(){

    if(current>=total){

        finish();

        return;

    }

    a=Math.floor(Math.random()*8)+2;

    b=Math.floor(Math.random()*9)+1;

    document.getElementById("question").innerHTML=

    (current+1)+"번 문제 : "+a+" × "+b+" = ?";

    document.getElementById("answer").value="";

    document.getElementById("message").innerHTML="";

    document.getElementById("count").innerHTML=

    "진행 : "+current+" / "+total;

}

function check(){

    let ans=Number(document.getElementById("answer").value);

    if(ans===a*b){

        current++;

        nextQuestion();

    }else{

        document.getElementById("message").innerHTML=

        "틀렸습니다! 다시 시작 버튼을 눌러주세요.";

    }

}

function restart(){

    startGame();

}

function quit(){

    document.getElementById("game").innerHTML=

    "<h2>게임을 종료했습니다.</h2>";

}

function finish(){

    let end=new Date();

    let sec=Math.floor((end-startTime)/1000);

    let min=Math.floor(sec/60);

    let s=sec%60;

    document.getElementById("game").innerHTML=

    "<h2>축하합니다!</h2>" +

    "<h3>"+min+"분 "+s+"초 걸렸습니다.</h3>";

}

startGame();

</script>

</body>

</html>
