<!DOCTYPE html>

<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>무한 클릭 게임</title>

<style>

body{

    font-family: Arial, sans-serif;

    text-align:center;

    background:#e6f7ff;

    margin-top:40px;

}

h1{

    color:#333;

}

#count{

    font-size:50px;

    color:#ff5722;

    margin:20px;

}

button{

    padding:15px 30px;

    font-size:20px;

    margin:10px;

    border:none;

    border-radius:12px;

    cursor:pointer;

}

#clickBtn{

    background:#4CAF50;

    color:white;

}

#resetBtn{

    background:#2196F3;

    color:white;

}

#quitBtn{

    background:#f44336;

    color:white;

}

</style>

</head>

<body>

<h1>🎮 무한 클릭 게임</h1>

<h2>🐻 클릭해 보세요!</h2>

<div id="count">0</div>

<p>🏆 최고 기록 : <span id="best">0</span></p>

<button id="clickBtn" onclick="clickGame()">클릭!</button>

<button id="resetBtn" onclick="resetGame()">초기화</button>

<button id="quitBtn" onclick="quitGame()">그만하기</button>

<script>

let count = 0;

let best = 0;

function clickGame(){

    count++;

    document.getElementById("count").innerText = count;

    if(count > best){

        best = count;

        document.getElementById("best").innerText = best;

    }

}

function resetGame(){

    count = 0;

    document.getElementById("count").innerText = count;

}

function quitGame(){

    document.body.innerHTML = `

        <h1>👋 게임을 종료했습니다.</h1>

        <h2>오늘의 최고 기록: ${best}회</h2>

    `;

}

</script>

</body>

</html>
