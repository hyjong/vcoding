

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>함정 퀴즈 게임</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    background:#111;
    color:white;
}

button{
    padding:10px 16px;
    margin:6px;
    cursor:pointer;
    border:none;
    border-radius:8px;
}

.choice{
    display:block;
    width:300px;
    margin:10px auto;
    background:#3498db;
    color:white;
}

#menu,#game,#end{
    margin-top:40px;
}

#start{background:limegreen;}
#home{background:orange;}
</style>
</head>

<body>

<div id="menu">
<h1>😈 함정 퀴즈 게임</h1>
<button id="start" onclick="start()">시작</button>
</div>

<div id="game" style="display:none;">
<h2 id="question"></h2>
<div id="choices"></div>
<h3>점수: <span id="score">0</span></h3>
</div>

<div id="end" style="display:none;">
<h1>🎉 끝!</h1>
<h2>최종 점수: <span id="final"></span></h2>

<h3>📌 정답 확인</h3>
<div id="answers"></div>

<button id="home" onclick="home()">처음으로</button>
</div>

<script>

const quiz = [
{
q:"1 + 1 = ?",
c:["2","11","3","창문"],
a:0,p:10
},
{
q:"대한민국 수도는?",
c:["부산","서울","대전","인천"],
a:1,p:10
},
{
q:"물의 화학식은?",
c:["CO2","H2O","O2","NaCl"],
a:1,p:10
},
{
q:"태양계에서 가장 큰 행성은?",
c:["지구","목성","토성","금성"],
a:1,p:10
},
{
q:"다음 중 포유류가 아닌 것은?",
c:["고래","박쥐","상어","사람"],
a:2,p:20
},
{
q:"사과는 어떤 과일인가?",
c:["과일","채소","고기","정답없음"],
a:0,p:5
},
{
q:"다음 중 가장 빠른 것은?",
c:["빛","자동차","자전거","달팽이"],
a:0,p:15
},
{
q:"2 × 5 = ?",
c:["10","25","7","12"],
a:0,p:10
},
{
q:"대한민국 국기는?",
c:["태극기","성조기","일장기","중국기"],
a:0,p:10
},
{
q:"다음 중 짝수는?",
c:["3","7","9","10"],
a:3,p:10
},
{
q:"지구는 몇 개?",
c:["1","2","3","모름"],
a:0,p:5
},
{
q:"바나나를 거꾸로 쓰면?",
c:["나나바","banana","바나나","몰라"],
a:0,p:20
}
];

let index=0;
let score=0;

function start(){
index=0;
score=0;

document.getElementById("score").innerText=0;

document.getElementById("menu").style.display="none";
document.getElementById("end").style.display="none";
document.getElementById("game").style.display="block";

show();
}

function show(){

if(index>=quiz.length){
end();
return;
}

let q=quiz[index];

document.getElementById("question").innerText=q.q;

let html="";

for(let i=0;i<q.c.length;i++){
html+=`
<button class="choice" onclick="check(${i})">
${q.c[i]}
</button>
`;
}

document.getElementById("choices").innerHTML=html;
}

function check(n){

if(n==quiz[index].a){
score+=quiz[index].p;
}

document.getElementById("score").innerText=score;

index++;
show();
}

function end(){

document.getElementById("game").style.display="none";
document.getElementById("end").style.display="block";

document.getElementById("final").innerText=score;

let html="";

for(let i=0;i<quiz.length;i++){
html+=`
<p>
${i+1}. ${quiz[i].q}<br>
👉 정답: ${quiz[i].c[quiz[i].a]}
</p>
<hr>
`;
}

document.getElementById("answers").innerHTML=html;
}

function home(){
document.getElementById("end").style.display="none";
document.getElementById("menu").style.display="block";
}

</script>

</body>
</html>
